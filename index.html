<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QQMusic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            min-height: 100vh;
        }

        body.dark {
            background: #000000;
            color: #ffffff;
        }

        /* ========== ПК ВЕРСИЯ ========== */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 80px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-right: 0.5px solid rgba(0, 0, 0, 0.08);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            align-items: center;
        }

        body.dark .sidebar {
            background: rgba(28, 28, 30, 0.95);
            border-right-color: rgba(255, 255, 255, 0.08);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #8e8e93;
            font-size: 24px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 122, 255, 0.12);
            color: #007aff;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .account-icon, .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #8e8e93;
            font-size: 24px;
            background: rgba(120, 120, 128, 0.08);
        }

        .account-icon:hover, .theme-toggle:hover {
            background: rgba(0, 122, 255, 0.12);
            color: #007aff;
        }

        .main-content {
            flex: 1;
            margin-left: 80px;
            padding: 32px 40px 100px;
        }

        /* ========== ЛОГОТИП С ГРАДИЕНТОМ (ИСПРАВЛЕН) ========== */
        .center-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .center-header h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #1c1c1e, #007aff, #5856d6, #1c1c1e);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 6s ease infinite;
            margin-bottom: 8px;
        }

        body.dark .center-header h1 {
            background: linear-gradient(135deg, #ffffff, #007aff, #5856d6, #ffffff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .center-header p {
            font-size: 14px;
            color: #8e8e93;
        }

        /* ========== ГЛАВНАЯ СТРАНИЦА ========== */
        .welcome-section {
            background: linear-gradient(135deg, rgba(0,122,255,0.1), rgba(88,86,214,0.1));
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .welcome-subtitle {
            color: #8e8e93;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 0.5px solid rgba(0,0,0,0.04);
        }

        body.dark .stat-card {
            background: #1c1c1e;
            border-color: rgba(255,255,255,0.04);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #007aff;
        }

        .stat-label {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 8px;
        }

        .top-list {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }

        body.dark .top-list {
            background: #1c1c1e;
        }

        .top-list h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .top-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }

        body.dark .top-item {
            border-bottom-color: rgba(255,255,255,0.05);
        }

        .top-rank {
            font-size: 18px;
            font-weight: 700;
            color: #007aff;
            width: 32px;
        }

        .top-info {
            flex: 1;
        }

        .top-name {
            font-weight: 600;
        }

        .top-count {
            font-size: 12px;
            color: #8e8e93;
        }

        .empty-stats {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
        }

        .search-box {
            background: white;
            border-radius: 44px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        body.dark .search-box {
            background: #1c1c1e;
            border-color: rgba(255,255,255,0.04);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px;
            outline: none;
            color: inherit;
        }

        .search-clear {
            background: none;
            border: none;
            cursor: pointer;
            color: #8e8e93;
            display: none;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .track-item {
            background: white;
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        body.dark .track-item {
            background: #1c1c1e;
            border-color: rgba(255,255,255,0.04);
        }

        .track-item:hover {
            background: #f9f9fb;
            transform: translateX(4px);
        }

        body.dark .track-item:hover {
            background: #2c2c2e;
        }

        .track-item.active {
            background: rgba(0, 122, 255, 0.08);
        }

        .track-number {
            font-size: 15px;
            color: #8e8e93;
            width: 32px;
        }

        .track-cover {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f2f2f5, #e8e8ed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #007aff;
            font-size: 22px;
        }

        body.dark .track-cover {
            background: linear-gradient(135deg, #2c2c2e, #3a3a3c);
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-size: 16px;
            font-weight: 600;
        }

        .track-artist {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .favorite-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            padding: 8px;
            transition: transform 0.1s;
        }

        .favorite-btn i {
            color: #c6c6c8;
            -webkit-text-stroke: 1px #8e8e93;
        }

        .favorite-btn.active i {
            color: #ff3b30;
            -webkit-text-stroke: 0;
            animation: heartBeat 0.3s ease-in-out;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8e8e93;
            background: white;
            border-radius: 24px;
        }

        body.dark .empty-state {
            background: #1c1c1e;
        }

        .desktop-player {
            position: fixed;
            bottom: 0;
            left: 80px;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.05);
            padding: 12px 32px;
            z-index: 100;
            transition: transform 0.3s;
        }

        body.dark .desktop-player {
            background: rgba(28, 28, 30, 0.98);
        }

        .desktop-player.hidden {
            transform: translateY(100%);
            pointer-events: none;
        }

        .player-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .player-info {
            min-width: 200px;
            flex: 1;
        }

        .player-title {
            font-size: 16px;
            font-weight: 600;
        }

        .player-artist {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 2px;
        }

        .player-controls {
            display: flex;
            gap: 16px;
        }

        .player-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            font-size: 20px;
            color: inherit;
            transition: all 0.2s;
        }

        .player-btn:hover {
            background: rgba(0, 122, 255, 0.1);
            color: #007aff;
        }

        .play-btn {
            background: #007aff;
            color: white;
            width: 52px;
            height: 52px;
            font-size: 22px;
        }

        .progress-area {
            flex: 2;
            min-width: 200px;
        }

        .progress-bar-bg {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 100px;
            height: 4px;
            cursor: pointer;
        }

        .progress-fill {
            background: #007aff;
            height: 100%;
            border-radius: 100px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8e8e93;
            margin-top: 6px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.03);
            padding: 4px 12px;
            border-radius: 40px;
        }

        body.dark .volume-control {
            background: rgba(255, 255, 255, 0.05);
        }

        .volume-slider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .profile-tab {
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            text-align: center;
        }

        body.dark .profile-card {
            background: #1c1c1e;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 48px;
            font-weight: 600;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-email {
            color: #8e8e93;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .profile-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .profile-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
            color: #007aff;
            background: rgba(0, 122, 255, 0.1);
        }

        .profile-icon-btn:hover {
            background: #007aff;
            color: white;
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        body.dark .modal-content {
            background: #1c1c1e;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 16px;
            background: #f9f9fb;
        }

        body.dark .input-group input {
            background: #2c2c2e;
            border-color: rgba(255,255,255,0.1);
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn-primary {
            background: #007aff;
            color: white;
            border: none;
        }

        .modal-btn-secondary {
            background: none;
            border: 1px solid #8e8e93;
            color: #8e8e93;
        }

        .modal-btn-danger {
            background: #ff3b30;
            color: white;
            border: none;
        }

        .switch-auth {
            margin-top: 16px;
            font-size: 13px;
            color: #8e8e93;
        }

        .switch-auth button {
            background: none;
            border: none;
            color: #007aff;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px 16px 100px; }
            .center-header h1 { font-size: 36px; }
            .desktop-player { display: none; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .welcome-title { font-size: 24px; }

            .mobile-bottom-container {
                position: fixed;
                bottom: 20px;
                left: 16px;
                right: 16px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                z-index: 100;
            }

            .mobile-tab-bar {
                background: rgba(255, 255, 255, 0.94);
                backdrop-filter: blur(20px);
                border-radius: 40px;
                padding: 8px 12px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
                border: 0.5px solid rgba(255, 255, 255, 0.3);
                display: inline-flex;
                flex: 1;
            }

            body.dark .mobile-tab-bar {
                background: rgba(28, 28, 30, 0.94);
            }

            .tab-bar-items {
                display: flex;
                gap: 8px;
                width: 100%;
                justify-content: space-around;
            }

            .tab-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 8px 16px;
                cursor: pointer;
                color: #8e8e93;
                font-size: 22px;
                border-radius: 30px;
                transition: all 0.2s;
            }

            .tab-item span {
                font-size: 10px;
                font-weight: 500;
            }

            .tab-item.active {
                color: #007aff;
                background: rgba(0, 122, 255, 0.12);
            }

            .floating-search-btn {
                background: rgba(255, 255, 255, 0.94);
                backdrop-filter: blur(20px);
                border-radius: 40px;
                width: 64px;
                height: 64px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: #8e8e93;
                font-size: 26px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
                border: 0.5px solid rgba(255, 255, 255, 0.3);
                flex-shrink: 0;
            }

            body.dark .floating-search-btn {
                background: rgba(28, 28, 30, 0.94);
            }

            .mini-player {
                position: fixed;
                bottom: 100px;
                left: 16px;
                right: 16px;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(20px);
                border-radius: 56px;
                padding: 6px 16px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                z-index: 99;
                transition: all 0.3s;
                border: 0.5px solid rgba(255, 255, 255, 0.3);
            }

            body.dark .mini-player {
                background: rgba(28, 28, 30, 0.92);
            }

            .mini-player.hidden {
                transform: translateY(100px);
                opacity: 0;
                pointer-events: none;
            }

            .mini-content {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .mini-info {
                flex: 1;
            }

            .mini-title {
                font-size: 14px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .mini-artist {
                font-size: 11px;
                color: #8e8e93;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .mini-controls {
                display: flex;
                gap: 6px;
            }

            .mini-ctrl {
                background: none;
                border: none;
                width: 40px;
                height: 40px;
                border-radius: 40px;
                font-size: 18px;
                cursor: pointer;
                color: inherit;
            }

            .mini-play {
                background: #ffffff;
                color: #007aff;
                width: 44px;
                height: 44px;
                font-size: 20px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                border: 0.5px solid rgba(0, 0, 0, 0.05);
            }

            body.dark .mini-play {
                background: #2c2c2e;
                color: #007aff;
            }
        }

        @media (min-width: 769px) {
            .mobile-bottom-container { display: none; }
            .mini-player { display: none; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-nav">
            <div class="nav-item" data-tab="home"><i class="fas fa-home"></i></div>
            <div class="nav-item" data-tab="search"><i class="fas fa-search"></i></div>
            <div class="nav-item" data-tab="favorites"><i class="fas fa-heart"></i></div>
        </div>
        <div class="sidebar-footer">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
            <div class="account-icon" id="pcAccountIcon"><i class="fas fa-user-circle"></i></div>
        </div>
    </div>

    <div class="main-content">
        <div class="center-header">
            <h1>QQMusic</h1>
            <p>Music is live</p>
        </div>

        <div id="homeTab">
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-title" id="welcomeTitle">Добро пожаловать!</div>
                <div class="welcome-subtitle" id="welcomeSubtitle">Ваша музыкальная статистика</div>
            </div>
            <div id="statsContainer"></div>
        </div>

        <div id="searchTab" style="display: none;">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск...">
                <button class="search-clear" id="searchClear"><i class="fas fa-times-circle"></i></button>
            </div>
            <div class="section-title">Все треки</div>
            <div class="track-list" id="trackList"></div>
        </div>

        <div id="favoritesTab" style="display: none;">
            <div class="section-title">Любимые треки</div>
            <div class="track-list" id="favoritesList"></div>
        </div>

        <div id="profileTab" style="display: none;">
            <div class="profile-tab">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div class="profile-name" id="profileName">Гость</div>
                    <div class="profile-email" id="profileEmail">Не авторизован</div>
                    <div class="profile-actions">
                        <button class="profile-icon-btn" id="editProfileBtn"><i class="fas fa-pencil-alt"></i></button>
                        <button class="profile-icon-btn" id="themeToggleMobile"><i class="fas fa-moon"></i></button>
                        <button class="profile-icon-btn" id="logoutConfirmBtn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="mobile-bottom-container">
    <div class="mobile-tab-bar">
        <div class="tab-bar-items">
            <div class="tab-item" data-tab="home"><i class="fas fa-home"></i><span>Главная</span></div>
            <div class="tab-item" data-tab="favorites"><i class="fas fa-heart"></i><span>Любимые треки</span></div>
            <div class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>Профиль</span></div>
        </div>
    </div>
    <div class="floating-search-btn" id="mobileSearchBtn"><i class="fas fa-search"></i></div>
</div>

<div class="mini-player hidden" id="miniPlayer">
    <div class="mini-content">
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">Выберите трек</div>
            <div class="mini-artist" id="miniArtist">—</div>
        </div>
        <div class="mini-controls">
            <button class="mini-ctrl mini-play" id="miniPlay"><i class="fas fa-play"></i></button>
            <button class="mini-ctrl" id="miniNext"><i class="fas fa-forward-step"></i></button>
        </div>
    </div>
</div>

<div class="desktop-player hidden" id="desktopPlayer">
    <div class="player-container">
        <div class="player-info">
            <div class="player-title" id="desktopTitle">Выберите трек</div>
            <div class="player-artist" id="desktopArtist">—</div>
        </div>
        <div class="player-controls">
            <button class="player-btn" id="playerPrev"><i class="fas fa-backward-step"></i></button>
            <button class="player-btn play-btn" id="playerPlay"><i class="fas fa-play"></i></button>
            <button class="player-btn" id="playerNext"><i class="fas fa-forward-step"></i></button>
            <button class="player-btn" id="playerShuffle"><i class="fas fa-random"></i></button>
            <button class="player-btn" id="playerRepeat"><i class="fas fa-repeat"></i></button>
        </div>
        <div class="progress-area">

            <div class="time-info"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
        </div>
        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.75">
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDtgOzn6FU5LP1S0kmiR55W0LFBPIcVNpQ",
        authDomain: "tepstack.firebaseapp.com",
        projectId: "tepstack",
        storageBucket: "tepstack.firebasestorage.app",
        messagingSenderId: "1026996075508",
        appId: "1:1026996075508:web:cbe0303d8c48b60f9097a1",
        measurementId: "G-L4W7WNP4YT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    window.auth = auth;
    window.db = db;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
    window.signOut = signOut;
    window.onAuthStateChanged = onAuthStateChanged;
    window.updateProfile = updateProfile;
    window.doc = doc;
    window.getDoc = getDoc;
    window.setDoc = setDoc;

    const tracksData = [
        { id: 1, title: "Supreme X Vetements", artist: "FACE", file: "FACE_-_Supreme_X_Vetements_64742030.mp3" },
        { id: 2, title: "Лабиринт", artist: "FACE", file: "FACE_-_LABIRINT_66800217.mp3" },
        { id: 3, title: "PSP", artist: "FACE", file: "FACE_-_PSP_64742023.mp3" },
        { id: 4, title: "Forever Young", artist: "FACE", file: "FACE_-_Forever_Young_64629973.mp3" },
        { id: 5, title: "Tom Ford", artist: "Moreart", file: "Moreart_-_Tom_Ford_80014966.mp3" }
    ];

    let listeningStats = { totalPlays: 0, totalSeconds: 0, trackPlays: {}, artistPlays: {}, recentTracks: [] };
    let currentIndex = 0, isPlaying = false, audio = null, shuffleMode = false, repeatMode = 'none', searchQuery = '';
    let currentUser = null, favorites = new Set(), currentTab = 'home';
    let preloadAudio = null, nextPreloadIndex = -1;
    let playStartTime = null;

    // DOM элементы (сокращённо, полный код как в предыдущей версии)
    const trackListEl = document.getElementById('trackList');
    const favoritesListEl = document.getElementById('favoritesList');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const homeTab = document.getElementById('homeTab');
    const searchTab = document.getElementById('searchTab');
    const favoritesTab = document.getElementById('favoritesTab');
    const profileTab = document.getElementById('profileTab');
    const navItems = document.querySelectorAll('.nav-item[data-tab], .tab-item[data-tab]');
    const mobileSearchBtn = document.getElementById('mobileSearchBtn');
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const profileAvatar = document.getElementById('profileAvatar');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const logoutConfirmBtn = document.getElementById('logoutConfirmBtn');
    const editModal = document.getElementById('editModal');
    const logoutModal = document.getElementById('logoutModal');
    const authModal = document.getElementById('authModal');
    const pcAccountIcon = document.getElementById('pcAccountIcon');
    const themeToggle = document.getElementById('themeToggle');
    const themeToggleMobile = document.getElementById('themeToggleMobile');
    const welcomeTitle = document.getElementById('welcomeTitle');
    const welcomeSubtitle = document.getElementById('welcomeSubtitle');
    const statsContainer = document.getElementById('statsContainer');

    const desktopPlayer = document.getElementById('desktopPlayer');
    const miniPlayer = document.getElementById('miniPlayer');
    const miniTitle = document.getElementById('miniTitle');
    const miniArtist = document.getElementById('miniArtist');
    const miniPlay = document.getElementById('miniPlay');
    const miniNext = document.getElementById('miniNext');
    const desktopTitle = document.getElementById('desktopTitle');
    const desktopArtist = document.getElementById('desktopArtist');
    const playerPlay = document.getElementById('playerPlay');
    const playerPrev = document.getElementById('playerPrev');
    const playerNext = document.getElementById('playerNext');
    const playerShuffle = document.getElementById('playerShuffle');
    const playerRepeat = document.getElementById('playerRepeat');
    const progressFill = document.getElementById('progressFill');
    const progressBarBg = document.getElementById('progressBarBg');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');

    // Функции (сохранены из предыдущей версии)
    function loadStats() { const saved = localStorage.getItem('qqmusic_stats'); if (saved) { try { listeningStats = JSON.parse(saved); } catch(e) {} } if (!listeningStats.trackPlays) listeningStats.trackPlays = {}; if (!listeningStats.artistPlays) listeningStats.artistPlays = {}; if (!listeningStats.recentTracks) listeningStats.recentTracks = []; if (!listeningStats.totalPlays) listeningStats.totalPlays = 0; if (!listeningStats.totalSeconds) listeningStats.totalSeconds = 0; }
    function saveStats() { localStorage.setItem('qqmusic_stats', JSON.stringify(listeningStats)); if (currentUser) saveStatsToFirebase(); renderHomeStats(); }
    async function saveStatsToFirebase() { if (!currentUser) return; try { await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { stats: listeningStats }, { merge: true }); } catch(e) {} }
    async function loadStatsFromFirebase() { if (!currentUser) return; try { const userDoc = await window.getDoc(window.doc(window.db, 'users', currentUser.uid)); if (userDoc.exists() && userDoc.data().stats) { listeningStats = userDoc.data().stats; localStorage.setItem('qqmusic_stats', JSON.stringify(listeningStats)); renderHomeStats(); } } catch(e) {} }
    function recordPlay(trackId, artist, seconds) { if (!trackId) return; listeningStats.totalPlays++; listeningStats.totalSeconds += seconds; listeningStats.trackPlays[trackId] = (listeningStats.trackPlays[trackId] || 0) + 1; listeningStats.artistPlays[artist] = (listeningStats.artistPlays[artist] || 0) + 1; listeningStats.recentTracks.unshift({ trackId, artist, title: tracksData.find(t => t.id === trackId)?.title, timestamp: Date.now() }); if (listeningStats.recentTracks.length > 20) listeningStats.recentTracks.pop(); saveStats(); }
    function renderHomeStats() { if (!statsContainer) return; const userName = currentUser?.displayName || currentUser?.email?.split('@')[0] || 'Гость'; welcomeTitle.innerHTML = `👋 Привет, ${userName}!`; welcomeSubtitle.innerHTML = listeningStats.totalPlays > 0 ? `Ты прослушал ${listeningStats.totalPlays} треков за всё время` : 'Начни слушать музыку, чтобы увидеть статистику'; if (listeningStats.totalPlays === 0) { statsContainer.innerHTML = '<div class="empty-stats"><i class="fas fa-chart-line" style="font-size: 48px; opacity: 0.3; margin-bottom: 16px; display: block;"></i>Статистика появится после прослушивания треков</div>'; return; } const totalMinutes = Math.floor(listeningStats.totalSeconds / 60); const topTracks = Object.entries(listeningStats.trackPlays).sort((a,b) => b[1] - a[1]).slice(0, 3); const topArtists = Object.entries(listeningStats.artistPlays).sort((a,b) => b[1] - a[1]).slice(0, 3); statsContainer.innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-number">${listeningStats.totalPlays}</div><div class="stat-label">Всего треков</div></div><div class="stat-card"><div class="stat-number">${totalMinutes}</div><div class="stat-label">Минут прослушивания</div></div></div>${topTracks.length > 0 ? `<div class="top-list"><h3>🎵 Чаще всего слушаемые треки</h3>${topTracks.map(([id, count], idx) => { const track = tracksData.find(t => t.id == id); return `<div class="top-item"><div class="top-rank">${idx+1}</div><div class="top-info"><div class="top-name">${track?.title || 'Неизвестно'}</div><div class="top-count">${count} прослушиваний</div></div></div>`; }).join('')}</div>` : ''}${topArtists.length > 0 ? `<div class="top-list"><h3>🎤 Чаще всего слушаемые исполнители</h3>${topArtists.map(([artist, count], idx) => `<div class="top-item"><div class="top-rank">${idx+1}</div><div class="top-info"><div class="top-name">${artist}</div><div class="top-count">${count} прослушиваний</div></div></div>`).join('')}</div>` : ''}`; }

    function getAudioUrl(file) { return `audio/${file}`; }
    function preloadTrack(index) { if (index < 0 || index >= tracksData.length) return; if (nextPreloadIndex === index && preloadAudio && preloadAudio.src) return; const track = tracksData[index]; if (!track) return; if (!preloadAudio) preloadAudio = new Audio(); preloadAudio.src = getAudioUrl(track.file); preloadAudio.load(); nextPreloadIndex = index; }
    function getNextIndex() { if (shuffleMode) { let next; do { next = Math.floor(Math.random() * tracksData.length); } while (next === currentIndex && tracksData.length > 1); return next; } else { let next = currentIndex + 1; if (next >= tracksData.length) next = repeatMode === 'all' ? 0 : currentIndex; return next; } }
    function setupAudioEvents(audioElem, track, autoPlay) { audioElem.addEventListener('loadedmetadata', () => { durationSpan.textContent = formatDuration(audioElem.duration); }); audioElem.addEventListener('timeupdate', () => { if (audioElem.duration) { progressFill.style.width = (audioElem.currentTime / audioElem.duration * 100) + '%'; currentTimeSpan.textContent = formatDuration(audioElem.currentTime); } }); audioElem.addEventListener('play', () => { playStartTime = Date.now(); }); audioElem.addEventListener('pause', () => { if (playStartTime) { const playedSeconds = (Date.now() - playStartTime) / 1000; if (playedSeconds > 3) { recordPlay(track.id, track.artist, playedSeconds); } playStartTime = null; } }); audioElem.addEventListener('ended', () => { if (playStartTime) { const playedSeconds = (Date.now() - playStartTime) / 1000; if (playedSeconds > 3) { recordPlay(track.id, track.artist, playedSeconds); } playStartTime = null; } if (repeatMode === 'one') { audioElem.currentTime = 0; audioElem.play(); } else { const nextIdx = getNextIndex(); if (nextIdx !== currentIndex) { currentIndex = nextIdx; loadTrack(currentIndex, true); } else { isPlaying = false; updatePlayBtn(); } } }); updatePlayerInfo(track); showPlayer(); if (autoPlay) { audioElem.play().then(() => { isPlaying = true; updatePlayBtn(); const nextIdx = getNextIndex(); if (nextIdx !== currentIndex) preloadTrack(nextIdx); }).catch(() => { isPlaying = false; updatePlayBtn(); }); } else { isPlaying = false; updatePlayBtn(); const nextIdx = getNextIndex(); if (nextIdx !== currentIndex) preloadTrack(nextIdx); } }
    function loadTrack(index, autoPlay = false) { if (index < 0) index = 0; if (index >= tracksData.length) index = 0; currentIndex = index; const track = tracksData[currentIndex]; if (!track) return; const currentVolume = volumeSlider.value; if (audio) { audio.pause(); audio.currentTime = 0; audio = null; } if (nextPreloadIndex === index && preloadAudio && preloadAudio.src) { audio = preloadAudio; preloadAudio = null; nextPreloadIndex = -1; } else { audio = new Audio(getAudioUrl(track.file)); } audio.volume = currentVolume; setupAudioEvents(audio, track, autoPlay); renderTrackList(); }
    function updatePlayerInfo(track) { const title = track.title, artist = track.artist; if (window.innerWidth <= 768) { miniTitle.textContent = title; miniArtist.textContent = artist; } else { desktopTitle.textContent = title; desktopArtist.textContent = artist; } }
    function togglePlay() { if (!tracksData[currentIndex]) return; if (!audio || !audio.src) { loadTrack(currentIndex, true); return; } if (audio.paused) { audio.play(); } else { audio.pause(); } }
    function updatePlayBtn() { const icon = window.innerWidth <= 768 ? miniPlay.querySelector('i') : playerPlay.querySelector('i'); if (icon) icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play'; }
    function nextTrack() { const nextIdx = getNextIndex(); if (nextIdx !== currentIndex) { currentIndex = nextIdx; loadTrack(currentIndex, true); } }
    function prevTrack() { let prevIdx = currentIndex - 1; if (prevIdx < 0) prevIdx = repeatMode === 'all' ? tracksData.length - 1 : currentIndex; if (prevIdx !== currentIndex) { currentIndex = prevIdx; loadTrack(currentIndex, true); } }
    function showPlayer() { if (window.innerWidth <= 768) miniPlayer.classList.remove('hidden'); else desktopPlayer.classList.remove('hidden'); }
    function hidePlayer() { if (window.innerWidth <= 768) miniPlayer.classList.add('hidden'); else desktopPlayer.classList.add('hidden'); }

    function renderTrackList() { const filtered = tracksData.filter(t => !searchQuery || t.title.toLowerCase().includes(searchQuery.toLowerCase()) || t.artist.toLowerCase().includes(searchQuery.toLowerCase())); if (!filtered.length) { trackListEl.innerHTML = '<div class="empty-state">Ничего не найдено</div>'; return; } trackListEl.innerHTML = filtered.map((t, i) => { const idx = tracksData.findIndex(tr => tr.id === t.id); const isFav = favorites.has(t.id); return `<div class="track-item" data-index="${idx}"><div class="track-number">${i+1}</div><div class="track-cover"><i class="fas fa-music"></i></div><div class="track-info"><div class="track-name">${escapeHtml(t.title)}</div><div class="track-artist">${escapeHtml(t.artist)}</div></div><button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${t.id}"><i class="fas fa-heart"></i></button></div>`; }).join(''); attachTrackEvents(trackListEl); }
    function renderFavoritesList() { const fav = tracksData.filter(t => favorites.has(t.id)); if (!fav.length) { favoritesListEl.innerHTML = '<div class="empty-state">Нет избранных треков</div>'; return; } favoritesListEl.innerHTML = fav.map((t, i) => { const idx = tracksData.findIndex(tr => tr.id === t.id); return `<div class="track-item" data-index="${idx}"><div class="track-number">${i+1}</div><div class="track-cover"><i class="fas fa-music"></i></div><div class="track-info"><div class="track-name">${escapeHtml(t.title)}</div><div class="track-artist">${escapeHtml(t.artist)}</div></div><button class="favorite-btn active" data-id="${t.id}"><i class="fas fa-heart"></i></button></div>`; }).join(''); attachTrackEvents(favoritesListEl); }
    function attachTrackEvents(container) { container.querySelectorAll('.track-item').forEach(el => { el.addEventListener('click', (e) => { if (e.target.closest('.favorite-btn')) return; const idx = parseInt(el.dataset.index); if (!isNaN(idx)) { currentIndex = idx; loadTrack(currentIndex, true); } }); }); container.querySelectorAll('.favorite-btn').forEach(btn => { btn.addEventListener('click', async (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); if (!currentUser) { showAuthModal(); return; } btn.style.transform = 'scale(1.2)'; setTimeout(() => { btn.style.transform = ''; }, 150); if (favorites.has(id)) favorites.delete(id); else favorites.add(id); await saveFavorites(); renderTrackList(); if (currentTab === 'favorites') renderFavoritesList(); btn.classList.toggle('active', favorites.has(id)); }); }); }
    async function saveFavorites() { if (currentUser) await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { favorites: Array.from(favorites) }, { merge: true }); }
    async function loadFavorites() { if (currentUser) { const doc = await window.getDoc(window.doc(window.db, 'users', currentUser.uid)); favorites = new Set(doc.exists() && doc.data().favorites ? doc.data().favorites : []); renderTrackList(); if (currentTab === 'favorites') renderFavoritesList(); } }

    function initTheme() { const savedTheme = localStorage.getItem('qqmusic_theme'); const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; if (savedTheme === 'dark' || (!savedTheme && prefersDark)) { document.body.classList.add('dark'); updateThemeIcons(true); } else { document.body.classList.remove('dark'); updateThemeIcons(false); } }
    function updateThemeIcons(isDark) { const icons = document.querySelectorAll('#themeToggle i, #themeToggleMobile i'); icons.forEach(icon => icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon'); }
    function toggleTheme() { const isDark = document.body.classList.contains('dark'); if (isDark) { document.body.classList.remove('dark'); localStorage.setItem('qqmusic_theme', 'light'); updateThemeIcons(false); if (currentUser) saveThemeToFirebase('light'); } else { document.body.classList.add('dark'); localStorage.setItem('qqmusic_theme', 'dark'); updateThemeIcons(true); if (currentUser) saveThemeToFirebase('dark'); } }
    async function saveThemeToFirebase(theme) { if (!currentUser) return; try { await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { theme }, { merge: true }); } catch(e) {} }
    async function loadThemeFromFirebase() { if (!currentUser) return; try { const userDoc = await window.getDoc(window.doc(window.db, 'users', currentUser.uid)); if (userDoc.exists() && userDoc.data().theme) { const savedTheme = userDoc.data().theme; if (savedTheme === 'dark') { document.body.classList.add('dark'); localStorage.setItem('qqmusic_theme', 'dark'); updateThemeIcons(true); } else { document.body.classList.remove('dark'); localStorage.setItem('qqmusic_theme', 'light'); updateThemeIcons(false); } } } catch(e) {} }

    function updateUI() { if (currentUser) { const displayName = currentUser.displayName || currentUser.email.split('@')[0]; profileName.textContent = displayName; profileEmail.textContent = currentUser.email; profileAvatar.textContent = displayName.charAt(0).toUpperCase(); } else { profileName.textContent = 'Гость'; profileEmail.textContent = 'Не авторизован'; profileAvatar.textContent = '👤'; } renderHomeStats(); }
    function showAuthModal() { authModal.classList.add('active'); }
    function hideAuthModal() { authModal.classList.remove('active'); }
    function showEditModal() { if (currentUser) { document.getElementById('editName').value = currentUser.displayName || ''; editModal.classList.add('active'); } }
    function hideEditModal() { editModal.classList.remove('active'); }
    function showLogoutConfirm() { if (currentUser) logoutModal.classList.add('active'); }
    function hideLogoutModal() { logoutModal.classList.remove('active'); }
    async function handleLogin() { const email = document.getElementById('loginEmail').value.trim(); const password = document.getElementById('loginPassword').value; if (!email || !password) { showAuthError('Заполните все поля'); return; } try { const res = await window.signInWithEmailAndPassword(window.auth, email, password); currentUser = res.user; updateUI(); hideAuthModal(); await loadFavorites(); await loadStatsFromFirebase(); } catch(e) { showAuthError('Неверный email или пароль'); } }
    async function handleRegister() { const name = document.getElementById('registerName').value.trim(); const email = document.getElementById('registerEmail').value.trim(); const password = document.getElementById('registerPassword').value; const confirm = document.getElementById('registerConfirm').value; if (!name || !email || !password) { showAuthError('Заполните все поля'); return; } if (password !== confirm) { showAuthError('Пароли не совпадают'); return; } if (password.length < 6) { showAuthError('Пароль минимум 6 символов'); return; } try { const res = await window.createUserWithEmailAndPassword(window.auth, email, password); await window.updateProfile(res.user, { displayName: name }); await window.setDoc(window.doc(window.db, 'users', res.user.uid), { displayName: name, email, favorites: [] }); currentUser = res.user; updateUI(); hideAuthModal(); await loadFavorites(); } catch(e) { showAuthError('Email уже зарегистрирован'); } }
    async function handleSaveName() { const newName = document.getElementById('editName').value.trim(); if (newName && currentUser) { await window.updateProfile(currentUser, { displayName: newName }); await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { displayName: newName }, { merge: true }); updateUI(); } hideEditModal(); }
    async function handleLogout() { await window.signOut(window.auth); currentUser = null; favorites.clear(); updateUI(); hideLogoutModal(); renderTrackList(); if (currentTab === 'favorites') renderFavoritesList(); hidePlayer(); renderHomeStats(); }
    function showAuthError(msg) { const errDiv = document.getElementById('authError'); errDiv.textContent = msg; errDiv.style.display = 'block'; setTimeout(() => errDiv.style.display = 'none', 3000); }

    let isLoginMode = true;
    document.getElementById('switchBtn').onclick = () => { isLoginMode = !isLoginMode; document.getElementById('loginForm').style.display = isLoginMode ? 'block' : 'none'; document.getElementById('registerForm').style.display = isLoginMode ? 'none' : 'block'; document.getElementById('modalTitle').textContent = isLoginMode ? 'Вход' : 'Регистрация'; document.getElementById('switchText').textContent = isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?'; document.getElementById('switchBtn').textContent = isLoginMode ? 'Зарегистрироваться' : 'Войти'; };

    function switchTab(tabId) { currentTab = tabId; homeTab.style.display = tabId === 'home' ? 'block' : 'none'; searchTab.style.display = tabId === 'search' ? 'block' : 'none'; favoritesTab.style.display = tabId === 'favorites' ? 'block' : 'none'; profileTab.style.display = tabId === 'profile' ? 'block' : 'none'; document.querySelectorAll('.nav-item, .tab-item').forEach(el => { if (el.dataset?.tab === tabId) el.classList.add('active'); else el.classList.remove('active'); }); if (tabId === 'favorites') renderFavoritesList(); if (tabId === 'profile' && !currentUser) showAuthModal(); if (tabId === 'home') renderHomeStats(); }
    function formatDuration(sec) { if (isNaN(sec)) return '0:00'; const m = Math.floor(sec/60), s = Math.floor(sec%60); return `${m}:${s<10?'0':''}${s}`; }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function seek(e) { if (!audio || !audio.duration) return; const rect = progressBarBg.getBoundingClientRect(); audio.currentTime = (e.clientX - rect.left) / rect.width * audio.duration; }
    function toggleShuffle() { shuffleMode = !shuffleMode; playerShuffle.classList.toggle('active', shuffleMode); }
    function toggleRepeat() { if (repeatMode === 'none') { repeatMode = 'all'; playerRepeat.classList.add('active'); playerRepeat.innerHTML = '<i class="fas fa-repeat"></i>'; } else if (repeatMode === 'all') { repeatMode = 'one'; playerRepeat.innerHTML = '<i class="fas fa-repeat-1"></i>'; } else { repeatMode = 'none'; playerRepeat.classList.remove('active'); playerRepeat.innerHTML = '<i class="fas fa-repeat"></i>'; } const nextIdx = getNextIndex(); if (nextIdx !== currentIndex && audio) preloadTrack(nextIdx); }

    function init() { loadStats(); initTheme(); if (themeToggle) themeToggle.addEventListener('click', toggleTheme); if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme); renderTrackList(); document.querySelectorAll('.nav-item[data-tab], .tab-item[data-tab]').forEach(i => i.addEventListener('click', () => switchTab(i.dataset.tab))); mobileSearchBtn?.addEventListener('click', () => switchTab('search')); playerPlay?.addEventListener('click', togglePlay); playerPrev?.addEventListener('click', prevTrack); playerNext?.addEventListener('click', nextTrack); playerShuffle?.addEventListener('click', toggleShuffle); playerRepeat?.addEventListener('click', toggleRepeat); miniPlay?.addEventListener('click', togglePlay); miniNext?.addEventListener('click', nextTrack); progressBarBg?.addEventListener('click', seek); volumeSlider?.addEventListener('input', e => { if(audio) audio.volume = e.target.value; }); searchInput?.addEventListener('input', e => { searchQuery = e.target.value; searchClear.style.display = searchQuery ? 'block' : 'none'; renderTrackList(); }); searchClear?.addEventListener('click', () => { searchInput.value = ''; searchQuery = ''; searchClear.style.display = 'none'; renderTrackList(); }); pcAccountIcon?.addEventListener('click', () => { if(currentUser) switchTab('profile'); else showAuthModal(); }); editProfileBtn?.addEventListener('click', showEditModal); logoutConfirmBtn?.addEventListener('click', showLogoutConfirm); document.getElementById('saveEditBtn')?.addEventListener('click', handleSaveName); document.getElementById('closeEditBtn')?.addEventListener('click', hideEditModal); document.getElementById('confirmLogoutBtn')?.addEventListener('click', handleLogout); document.getElementById('cancelLogoutBtn')?.addEventListener('click', hideLogoutModal); document.getElementById('loginBtn')?.addEventListener('click', handleLogin); document.getElementById('registerBtn')?.addEventListener('click', handleRegister); document.getElementById('closeAuthBtn')?.addEventListener('click', hideAuthModal); window.onAuthStateChanged(window.auth, async (user) => { currentUser = user; updateUI(); await loadFavorites(); if (user) { await loadStatsFromFirebase(); await loadThemeFromFirebase(); } else { loadStats(); renderHomeStats(); } }); window.addEventListener('click', e => { if(e.target === editModal) hideEditModal(); if(e.target === logoutModal) hideLogoutModal(); if(e.target === authModal) hideAuthModal(); }); switchTab('home'); hidePlayer(); if (tracksData.length) preloadTrack(0); renderHomeStats(); }
    init();
</script>
