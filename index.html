<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QQMusic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 140px;
        }

        /* ========== НОВЫЙ ЦЕНТРАЛЬНЫЙ ХЕДЕР ========== */
        .header {
            text-align: center;
            margin-bottom: 48px;
            padding: 20px 0;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #1c1c1e, #007aff, #5856d6, #1c1c1e);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 6s ease infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .logo p {
            font-size: 14px;
            color: #8e8e93;
            letter-spacing: 0.3px;
        }

        /* Счетчик треков теперь под хедером, справа */
        .stats-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .stats {
            font-size: 14px;
            color: #8e8e93;
            background: rgba(120, 120, 128, 0.08);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 500;
        }

        .search-container {
            margin-bottom: 32px;
        }

        .search-box {
            background: white;
            border-radius: 44px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }

        .search-box:focus-within {
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
            border-color: #007aff;
        }

        .search-box i {
            color: #8e8e93;
            font-size: 18px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px;
            font-family: inherit;
            outline: none;
            color: #1c1c1e;
        }

        .search-box input::placeholder {
            color: #aeaeb2;
        }

        .search-clear {
            background: none;
            border: none;
            cursor: pointer;
            color: #8e8e93;
            font-size: 16px;
            padding: 4px;
            display: none;
            transition: color 0.2s;
        }

        .search-clear:hover {
            color: #007aff;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 20px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .result-count {
            font-size: 14px;
            color: #8e8e93;
            font-weight: 400;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .track-item {
            background: white;
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .track-item:hover {
            background: #f9f9fb;
            transform: translateX(2px);
        }

        .track-item.active {
            background: rgba(0, 122, 255, 0.08);
        }

        .track-number {
            font-size: 15px;
            font-weight: 500;
            color: #8e8e93;
            width: 32px;
        }

        .track-cover {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f2f2f5, #e8e8ed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #007aff;
            font-size: 22px;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 13px;
            color: #8e8e93;
        }

        .track-duration {
            font-size: 13px;
            color: #aeaeb2;
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #8e8e93;
            background: white;
            border-radius: 24px;
        }

        .bottom-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.08);
            padding: 14px 24px;
            z-index: 100;
        }

        .player-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .track-info-mini {
            min-width: 180px;
            flex: 1;
        }

        .track-title-mini {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist-mini {
            font-size: 12px;
            color: #8e8e93;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #1c1c1e;
            font-size: 20px;
        }

        .ctrl-btn:hover {
            background: rgba(0, 122, 255, 0.12);
            color: #007aff;
            transform: scale(1.02);
        }

        .ctrl-btn:active {
            transform: scale(0.94);
        }

        .ctrl-btn.active {
            color: #007aff;
        }

        .play-btn {
            background: #007aff;
            color: white;
            width: 52px;
            height: 52px;
            font-size: 22px;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.2);
        }

        .play-btn:hover {
            background: #005fc4;
            color: white;
        }

        .progress-container {
            flex: 2;
            min-width: 160px;
        }

        .progress-bar-bg {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 100px;
            height: 4px;
            cursor: pointer;
        }

        .progress-fill {
            background: #007aff;
            height: 100%;
            border-radius: 100px;
            width: 0%;
            transition: width 0.05s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8e8e93;
            margin-top: 6px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-control i {
            color: #8e8e93;
            font-size: 16px;
        }

        .volume-slider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #007aff;
            border-radius: 12px;
            cursor: pointer;
        }

        /* ========== МОБИЛЬНАЯ ВЕРСИЯ ========== */
        @media (max-width: 768px) {
            .container {
                padding: 20px 16px 120px;
            }
            
            .logo h1 {
                font-size: 36px;
            }
            
            .stats-wrapper {
                margin-bottom: 16px;
            }
            
            .bottom-player {
                padding: 12px 16px;
            }
            .player-container {
                flex-direction: column;
                gap: 10px;
            }
            .track-info-mini {
                width: 100%;
                text-align: center;
            }
            .track-title-mini, .track-artist-mini {
                white-space: normal;
                text-align: center;
                font-size: 14px;
            }
            .track-title-mini {
                font-size: 15px;
                font-weight: 600;
            }
            .track-artist-mini {
                font-size: 12px;
            }
            .progress-container {
                width: 100%;
                margin: 4px 0;
            }
            .player-controls {
                order: -1;
                justify-content: center;
                margin-bottom: 4px;
                gap: 12px;
            }
            .ctrl-btn {
                width: 48px;
                height: 48px;
                font-size: 22px;
            }
            .play-btn {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }
            
            .volume-control {
                display: none !important;
            }
            
            .track-item {
                padding: 12px 16px;
            }
            .track-cover {
                width: 44px;
                height: 44px;
                font-size: 20px;
            }
            .track-number {
                width: 28px;
                font-size: 14px;
            }
            .track-name {
                font-size: 15px;
            }
            .track-artist {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Центральный хедер с логотипом -->
    <div class="header">
        <div class="logo">
            <h1>QQMusic</h1>
            <p>высокое качество звука</p>
        </div>
    </div>

    <!-- Счетчик треков справа под хедером -->
    <div class="stats-wrapper">
        <div class="stats" id="trackCount">0 треков</div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Поиск по названию или исполнителю...">
            <button class="search-clear" id="searchClear">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>
    </div>

    <div class="section-title">
        <span>Медиатека</span>
        <span class="result-count" id="resultCount"></span>
    </div>
    <div class="track-list" id="trackList"></div>
</div>

<div class="bottom-player">
    <div class="player-container">
        <div class="track-info-mini">
            <div class="track-title-mini" id="miniTitle">Выберите трек</div>
            <div class="track-artist-mini" id="miniArtist">—</div>
        </div>

        <div class="player-controls">
            <button class="ctrl-btn" id="shuffleBtn" title="Перемешать">
                <i class="fas fa-random"></i>
            </button>
            <button class="ctrl-btn" id="prevBtn" title="Предыдущий">
                <i class="fas fa-backward-step"></i>
            </button>
            <button class="ctrl-btn play-btn" id="playPauseBtn">
                <i class="fas fa-play"></i>
            </button>
            <button class="ctrl-btn" id="nextBtn" title="Следующий">
                <i class="fas fa-forward-step"></i>
            </button>
            <button class="ctrl-btn" id="repeatBtn" title="Повтор">
                <i class="fas fa-repeat"></i>
            </button>
        </div>

        <div class="progress-container">
            <div class="progress-bar-bg" id="progressBarBg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.75">
        </div>
    </div>
</div>

<script>
    const tracksData = [
        { id: 5, title: "Tom Ford", artist: "Moreart", file: "Moreart_-_Tom_Ford_80014966.mp3", duration: 198 },
        { id: 1, title: "Supreme X Vetements", artist: "FACE", file: "FACE_-_Supreme_X_Vetements_64742030.mp3", duration: 150 },
        { id: 2, title: "Лабиринт", artist: "FACE", file: "FACE_-_LABIRINT_66800217.mp3", duration: 210 },
        { id: 3, title: "PSP", artist: "FACE", file: "FACE_-_PSP_64742023.mp3", duration: 198 },
        { id: 4, title: "Forever Young", artist: "FACE", file: "FACE_-_Forever_Young_64629973.mp3", duration: 198 }
    ];

    let currentIndex = 0;
    let isPlaying = false;
    let audio = new Audio();
    let preloadAudio = new Audio();
    let shuffleMode = false;
    let repeatMode = 'none';
    let searchQuery = '';

    const trackListEl = document.getElementById('trackList');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const resultCountSpan = document.getElementById('resultCount');
    const miniTitle = document.getElementById('miniTitle');
    const miniArtist = document.getElementById('miniArtist');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = playPauseBtn.querySelector('i');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBarBg = document.getElementById('progressBarBg');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');
    const trackCountSpan = document.getElementById('trackCount');

    function getFilteredTracks() {
        if (!searchQuery.trim()) return tracksData;
        const query = searchQuery.toLowerCase();
        return tracksData.filter(track =>
            track.title.toLowerCase().includes(query) ||
            track.artist.toLowerCase().includes(query)
        );
    }

    function updateSearchResults() {
        const filtered = getFilteredTracks();
        resultCountSpan.textContent = filtered.length === tracksData.length ? '' : `${filtered.length} из ${tracksData.length}`;
        renderTrackList();
    }

    function renderTrackList() {
        const filtered = getFilteredTracks();
        trackCountSpan.textContent = `${tracksData.length} ${tracksData.length === 1 ? 'трек' : 'треков'}`;
        
        if (filtered.length === 0) {
            trackListEl.innerHTML = '<div class="empty-state"><i class="fas fa-music" style="font-size: 48px; opacity: 0.3; margin-bottom: 16px; display: block;"></i>Ничего не найдено<br><span style="font-size: 13px;">Попробуйте другой запрос</span></div>';
            return;
        }

        trackListEl.innerHTML = filtered.map((track, idx) => {
            const originalIdx = tracksData.findIndex(t => t.id === track.id);
            const isActive = originalIdx === currentIndex;
            return `
                <div class="track-item ${isActive ? 'active' : ''}" data-index="${originalIdx}">
                    <div class="track-number">${idx + 1}</div>
                    <div class="track-cover"><i class="fas fa-music"></i></div>
                    <div class="track-info">
                        <div class="track-name">${escapeHtml(track.title)}</div>
                        <div class="track-artist">${escapeHtml(track.artist)}</div>
                    </div>
                    <div class="track-duration">${formatDuration(track.duration)}</div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.track-item').forEach(el => {
            el.addEventListener('click', () => {
                const idx = parseInt(el.dataset.index);
                if (!isNaN(idx) && idx !== currentIndex) {
                    currentIndex = idx;
                    loadTrack(currentIndex, false);
                    if (!isPlaying) togglePlay();
                }
            });
        });
    }

    function getNextTrackIndex() {
        if (shuffleMode) {
            let next;
            do {
                next = Math.floor(Math.random() * tracksData.length);
            } while (next === currentIndex && tracksData.length > 1);
            return next;
        } else {
            let next = currentIndex + 1;
            if (next >= tracksData.length) {
                next = repeatMode === 'all' ? 0 : currentIndex;
            }
            return next;
        }
    }

    function preloadNextTrack() {
        const nextIndex = getNextTrackIndex();
        if (nextIndex !== currentIndex && nextIndex < tracksData.length) {
            const nextTrack = tracksData[nextIndex];
            if (nextTrack && nextTrack.file) {
                preloadAudio.src = `audio/${nextTrack.file}`;
                preloadAudio.load();
            }
        }
    }

    function stopCurrentTrack() {
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
            audio.onended = null;
            audio.ontimeupdate = null;
        }
    }

    function loadTrack(index, usePreload = false) {
        if (index < 0) index = 0;
        if (index >= tracksData.length) index = 0;
        currentIndex = index;
        const track = tracksData[currentIndex];
        if (!track) return;

        const wasPlaying = isPlaying;
        const currentVolume = volumeSlider.value;
        
        stopCurrentTrack();
        
        if (usePreload && preloadAudio.src && preloadAudio.src.includes(track.file)) {
            audio = preloadAudio;
            preloadAudio = new Audio();
        } else {
            audio = new Audio(`audio/${track.file}`);
        }
        
        audio.volume = currentVolume;

        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatDuration(audio.duration);
        });
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', handleTrackEnd);

        miniTitle.textContent = track.title;
        miniArtist.textContent = track.artist;
        document.title = `${track.title} — QQMusic`;

        if (wasPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
                preloadNextTrack();
            }).catch(() => {});
        } else {
            isPlaying = false;
            updatePlayButton();
            preloadNextTrack();
        }

        renderTrackList();
    }

    function handleTrackEnd() {
        if (repeatMode === 'one') {
            audio.currentTime = 0;
            audio.play();
            preloadNextTrack();
        } else if (repeatMode === 'all' || shuffleMode) {
            const nextIndex = getNextTrackIndex();
            if (nextIndex !== currentIndex) {
                currentIndex = nextIndex;
                loadTrack(currentIndex, true);
            }
        } else {
            const nextIndex = currentIndex + 1;
            if (nextIndex < tracksData.length) {
                currentIndex = nextIndex;
                loadTrack(currentIndex, true);
            } else {
                isPlaying = false;
                updatePlayButton();
            }
        }
    }

    function updateProgress() {
        if (audio.duration && !isNaN(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeSpan.textContent = formatDuration(audio.currentTime);
        }
    }

    function togglePlay() {
        if (!tracksData[currentIndex]?.file) return;
        
        if (!audio.src || audio.paused) {
            if (!audio.src) {
                loadTrack(currentIndex, false);
            }
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
                preloadNextTrack();
            }).catch(e => console.log(e));
        } else {
            audio.pause();
            isPlaying = false;
            updatePlayButton();
        }
    }

    function updatePlayButton() {
        if (isPlaying) {
            playIcon.className = 'fas fa-pause';
        } else {
            playIcon.className = 'fas fa-play';
        }
    }

    function nextTrack() {
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        
        const nextIndex = getNextTrackIndex();
        if (nextIndex !== currentIndex) {
            currentIndex = nextIndex;
            loadTrack(currentIndex, true);
            if (isPlaying) {
                setTimeout(() => {
                    if (audio) audio.play().catch(e => console.log(e));
                }, 10);
            }
        }
    }

    function prevTrack() {
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        
        let prevIndex;
        if (shuffleMode) {
            do {
                prevIndex = Math.floor(Math.random() * tracksData.length);
            } while (prevIndex === currentIndex && tracksData.length > 1);
        } else {
            prevIndex = currentIndex - 1;
            if (prevIndex < 0) {
                prevIndex = repeatMode === 'all' ? tracksData.length - 1 : currentIndex;
            }
        }
        if (prevIndex !== currentIndex) {
            currentIndex = prevIndex;
            loadTrack(currentIndex, false);
            if (isPlaying) {
                setTimeout(() => {
                    if (audio) audio.play().catch(e => console.log(e));
                }, 10);
            }
        }
    }

    function toggleShuffle() {
        shuffleMode = !shuffleMode;
        if (shuffleMode) {
            shuffleBtn.classList.add('active');
            if (repeatMode !== 'none') {
                repeatMode = 'none';
                repeatBtn.classList.remove('active');
                repeatBtn.querySelector('i').className = 'fas fa-repeat';
            }
            preloadNextTrack();
        } else {
            shuffleBtn.classList.remove('active');
        }
    }

    function toggleRepeat() {
        if (repeatMode === 'none') {
            repeatMode = 'all';
            repeatBtn.classList.add('active');
            repeatBtn.querySelector('i').className = 'fas fa-repeat';
            shuffleMode = false;
            shuffleBtn.classList.remove('active');
        } else if (repeatMode === 'all') {
            repeatMode = 'one';
            repeatBtn.querySelector('i').className = 'fas fa-repeat-1';
        } else {
            repeatMode = 'none';
            repeatBtn.classList.remove('active');
            repeatBtn.querySelector('i').className = 'fas fa-repeat';
        }
        preloadNextTrack();
    }

    function seek(e) {
        if (!audio.duration) return;
        const rect = progressBarBg.getBoundingClientRect();
        const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
        audio.currentTime = percent * audio.duration;
    }

    function formatDuration(sec) {
        if (isNaN(sec) || !sec || sec === Infinity) return '0:00';
        const mins = Math.floor(sec / 60);
        const secs = Math.floor(sec % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function handleSearch() {
        searchQuery = searchInput.value;
        searchClear.style.display = searchQuery ? 'block' : 'none';
        updateSearchResults();
    }

    function clearSearch() {
        searchInput.value = '';
        handleSearch();
        searchInput.focus();
    }

    function init() {
        renderTrackList();
        if (tracksData.length) loadTrack(0, false);
        
        playPauseBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        shuffleBtn.addEventListener('click', toggleShuffle);
        repeatBtn.addEventListener('click', toggleRepeat);
        progressBarBg.addEventListener('click', seek);
        volumeSlider.addEventListener('input', (e) => { if (audio) audio.volume = e.target.value; });
        
        searchInput.addEventListener('input', handleSearch);
        searchClear.addEventListener('click', clearSearch);
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement !== searchInput && document.activeElement !== volumeSlider) {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextTrack();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevTrack();
            }
        });
    }

    init();
</script>
</body>
</html>
