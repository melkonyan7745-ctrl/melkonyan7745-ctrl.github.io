<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QQMusic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDtgOzn6FU5LP1S0kmiR55W0LFBPIcVNpQ",
            authDomain: "tepstack.firebaseapp.com",
            projectId: "tepstack",
            storageBucket: "tepstack.firebasestorage.app",
            messagingSenderId: "1026996075508",
            appId: "1:1026996075508:web:cbe0303d8c48b60f9097a1",
            measurementId: "G-L4W7WNP4YT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.auth = auth;
        window.db = db;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.updateProfile = updateProfile;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            min-height: 100vh;
        }

        /* ========== ПК ВЕРСИЯ ========== */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 80px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-right: 0.5px solid rgba(0, 0, 0, 0.08);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            align-items: center;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #8e8e93;
            font-size: 24px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 122, 255, 0.12);
            color: #007aff;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-bottom: 24px;
        }

        .account-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #8e8e93;
            font-size: 28px;
            background: rgba(0, 0, 0, 0.03);
        }

        .account-icon:hover {
            background: rgba(0, 122, 255, 0.08);
            color: #007aff;
        }

        .main-content {
            flex: 1;
            margin-left: 80px;
            padding: 32px 40px 100px; /* увеличен нижний отступ для фиксированного плеера */
        }

        .center-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .center-header h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #1c1c1e, #007aff, #5856d6, #1c1c1e);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 6s ease infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .center-header p {
            font-size: 14px;
            color: #8e8e93;
        }

        .search-box {
            background: white;
            border-radius: 44px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px;
            outline: none;
        }

        .search-clear {
            background: none;
            border: none;
            cursor: pointer;
            color: #8e8e93;
            display: none;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .track-item {
            background: white;
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .track-item:hover {
            background: #f9f9fb;
            transform: translateX(4px);
        }

        .track-item.active {
            background: rgba(0, 122, 255, 0.08);
        }

        .track-number {
            font-size: 15px;
            color: #8e8e93;
            width: 32px;
        }

        .track-cover {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f2f2f5, #e8e8ed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #007aff;
            font-size: 22px;
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-size: 16px;
            font-weight: 600;
        }

        .track-artist {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .favorite-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            padding: 8px;
            transition: transform 0.1s;
        }

        .favorite-btn i {
            color: #c6c6c8;
            -webkit-text-stroke: 1px #8e8e93;
        }

        .favorite-btn.active i {
            color: #007aff;
            -webkit-text-stroke: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8e8e93;
            background: white;
            border-radius: 24px;
        }

        /* ПК Плеер — фиксированный внизу */
        .desktop-player {
            position: fixed;
            bottom: 0;
            left: 80px;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0, 0, 0, 0.05);
            padding: 12px 32px;
            z-index: 100;
            transition: transform 0.3s, opacity 0.3s;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.04);
        }

        .desktop-player.hidden {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        .player-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .player-info {
            min-width: 200px;
            flex: 1;
        }

        .player-title {
            font-size: 16px;
            font-weight: 600;
        }

        .player-artist {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 2px;
        }

        .player-controls {
            display: flex;
            gap: 16px;
        }

        .player-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            font-size: 20px;
            color: #1c1c1e;
            transition: all 0.2s;
        }

        .player-btn:hover {
            background: rgba(0, 122, 255, 0.1);
            color: #007aff;
        }

        .play-btn {
            background: #007aff;
            color: white;
            width: 52px;
            height: 52px;
            font-size: 22px;
        }

        .play-btn:hover {
            background: #005fc4;
            color: white;
        }

        .progress-area {
            flex: 2;
            min-width: 200px;
        }

        .progress-bar-bg {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 100px;
            height: 4px;
            cursor: pointer;
        }

        .progress-fill {
            background: #007aff;
            height: 100%;
            border-radius: 100px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #8e8e93;
            margin-top: 6px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.03);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .volume-slider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #007aff;
            border-radius: 12px;
            cursor: pointer;
        }

        /* Вкладка профиля */
        .profile-tab {
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            color: white;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-email {
            color: #8e8e93;
            margin-bottom: 24px;
        }

        .profile-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
        }

        .profile-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .edit-btn {
            background: #007aff;
            color: white;
        }

        .logout-confirm-btn {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
        }

        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 16px;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .confirm-btn, .cancel-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .confirm-btn {
            background: #ff3b30;
            color: white;
            border: none;
        }

        .cancel-btn {
            background: none;
            border: 1px solid #8e8e93;
            color: #8e8e93;
        }

        /* ========== МОБИЛЬНАЯ ВЕРСИЯ ========== */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px 16px 100px; }
            .center-header h1 { font-size: 36px; }
            .desktop-player { display: none; }

            .mobile-bottom-container {
                position: fixed;
                bottom: 20px;
                left: 16px;
                right: 16px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                z-index: 100;
            }

            .mobile-tab-bar {
                background: rgba(255, 255, 255, 0.94);
                backdrop-filter: blur(20px);
                border-radius: 40px;
                padding: 8px 12px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
                border: 0.5px solid rgba(255, 255, 255, 0.3);
                display: inline-flex;
                flex: 1;
            }

            .tab-bar-items {
                display: flex;
                gap: 8px;
                width: 100%;
                justify-content: space-around;
            }

            .tab-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 8px 16px;
                cursor: pointer;
                color: #8e8e93;
                font-size: 22px;
                border-radius: 30px;
                transition: all 0.2s;
                background: transparent;
            }

            .tab-item span {
                font-size: 10px;
                font-weight: 500;
            }

            .tab-item.active {
                color: #007aff;
                background: rgba(0, 122, 255, 0.12);
            }

            .floating-search-btn {
                background: rgba(255, 255, 255, 0.94);
                backdrop-filter: blur(20px);
                border-radius: 40px;
                width: 64px;
                height: 64px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: #8e8e93;
                font-size: 26px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
                transition: all 0.2s;
                border: 0.5px solid rgba(255, 255, 255, 0.3);
                flex-shrink: 0;
            }

            .floating-search-btn:active {
                transform: scale(0.94);
            }

            .mini-player {
                position: fixed;
                bottom: 100px;
                left: 16px;
                right: 16px;
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(20px);
                border-radius: 56px;
                padding: 6px 16px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                z-index: 99;
                transition: all 0.3s;
                border: 0.5px solid rgba(255, 255, 255, 0.3);
            }

            .mini-player.hidden {
                transform: translateY(100px);
                opacity: 0;
                pointer-events: none;
            }

            .mini-content {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .mini-info {
                flex: 1;
            }

            .mini-title {
                font-size: 14px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .mini-artist {
                font-size: 11px;
                color: #8e8e93;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .mini-controls {
                display: flex;
                gap: 6px;
            }

            .mini-ctrl {
                background: none;
                border: none;
                width: 40px;
                height: 40px;
                border-radius: 40px;
                font-size: 18px;
                cursor: pointer;
                color: #1c1c1e;
            }

            .mini-play {
                background: #ffffff;
                color: #007aff;
                width: 44px;
                height: 44px;
                font-size: 20px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                border: 0.5px solid rgba(0, 0, 0, 0.05);
            }
        }

        @media (min-width: 769px) {
            .mobile-bottom-container { display: none; }
            .mini-player { display: none; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="sidebar-nav">
            <div class="nav-item" data-tab="home"><i class="fas fa-home"></i></div>
            <div class="nav-item active" data-tab="search"><i class="fas fa-search"></i></div>
            <div class="nav-item" data-tab="favorites"><i class="fas fa-heart"></i></div>
        </div>
        <div class="sidebar-footer">
            <div class="account-icon" id="pcAccountIcon"><i class="fas fa-user-circle"></i></div>
        </div>
    </div>

    <div class="main-content">
        <div class="center-header">
            <h1>QQMusic</h1>
            <p>высокое качество звука</p>
        </div>

        <div id="homeTab"><div class="empty-state"><i class="fas fa-music"></i><p>Здесь будут рекомендации</p></div></div>

        <div id="searchTab">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск...">
                <button class="search-clear" id="searchClear"><i class="fas fa-times-circle"></i></button>
            </div>
            <div class="section-title">Все треки</div>
            <div class="track-list" id="trackList"></div>
        </div>

        <div id="favoritesTab"><div class="section-title">Избранное</div><div class="track-list" id="favoritesList"></div></div>

        <div id="profileTab" style="display: none;">
            <div class="profile-tab">
                <div class="profile-card">
                    <div class="profile-avatar"><i class="fas fa-user"></i></div>
                    <div class="profile-name" id="profileName">Гость</div>
                    <div class="profile-email" id="profileEmail">Не авторизован</div>
                    <div class="profile-actions">
                        <button class="profile-btn edit-btn" id="editProfileBtn"><i class="fas fa-pencil-alt"></i> Редактировать</button>
                        <button class="profile-btn logout-confirm-btn" id="logoutConfirmBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Мобильная навигация и кнопка поиска -->
<div class="mobile-bottom-container">
    <div class="mobile-tab-bar">
        <div class="tab-bar-items">
            <div class="tab-item" data-tab="home"><i class="fas fa-home"></i><span>Главная</span></div>
            <div class="tab-item" data-tab="favorites"><i class="fas fa-heart"></i><span>Медиатека</span></div>
            <div class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>Профиль</span></div>
        </div>
    </div>
    <div class="floating-search-btn" id="mobileSearchBtn"><i class="fas fa-search"></i></div>
</div>

<!-- Мини-плеер мобильный -->
<div class="mini-player hidden" id="miniPlayer">
    <div class="mini-content">
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">Выберите трек</div>
            <div class="mini-artist" id="miniArtist">—</div>
        </div>
        <div class="mini-controls">
            <button class="mini-ctrl mini-play" id="miniPlay"><i class="fas fa-play"></i></button>
            <button class="mini-ctrl" id="miniNext"><i class="fas fa-forward-step"></i></button>
        </div>
    </div>
</div>

<!-- ПК Плеер (фиксированный внизу) -->
<div class="desktop-player hidden" id="desktopPlayer">
    <div class="player-container">
        <div class="player-info">
            <div class="player-title" id="desktopTitle">Выберите трек</div>
            <div class="player-artist" id="desktopArtist">—</div>
        </div>
        <div class="player-controls">
            <button class="player-btn" id="playerPrev"><i class="fas fa-backward-step"></i></button>
            <button class="player-btn play-btn" id="playerPlay"><i class="fas fa-play"></i></button>
            <button class="player-btn" id="playerNext"><i class="fas fa-forward-step"></i></button>
            <button class="player-btn" id="playerShuffle"><i class="fas fa-random"></i></button>
            <button class="player-btn" id="playerRepeat"><i class="fas fa-repeat"></i></button>
        </div>
        <div class="progress-area">
            <div class="progress-bar-bg" id="progressBarBg"><div class="progress-fill" id="progressFill"></div></div>
            <div class="time-info"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
        </div>
        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.75">
        </div>
    </div>
</div>

<!-- Модалки -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>Редактировать профиль</h3>
        <div class="input-group"><input type="text" id="editName" placeholder="Ваше имя"></div>
        <button class="profile-btn edit-btn" id="saveEditBtn" style="width:100%">Сохранить</button>
        <button class="cancel-btn" id="closeEditBtn" style="margin-top:12px">Отмена</button>
    </div>
</div>

<div class="modal" id="logoutModal">
    <div class="modal-content">
        <h3>Выход из аккаунта</h3>
        <p>Вы уверены, что хотите выйти?</p>
        <div class="confirm-buttons">
            <button class="confirm-btn" id="confirmLogoutBtn">Выйти</button>
            <button class="cancel-btn" id="cancelLogoutBtn">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <i class="fas fa-music" style="font-size: 48px; color: #007aff;"></i>
        <h3 id="modalTitle">Вход</h3>
        <div id="authError" style="color:#ff3b30; font-size:12px; margin:10px 0; display:none;"></div>
        <div id="loginForm">
            <div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
            <button class="profile-btn edit-btn" id="loginBtn" style="width:100%">Войти</button>
        </div>
        <div id="registerForm" style="display:none">
            <div class="input-group"><input type="text" id="registerName" placeholder="Имя"></div>
            <div class="input-group"><input type="email" id="registerEmail" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="registerPassword" placeholder="Пароль"></div>
            <div class="input-group"><input type="password" id="registerConfirm" placeholder="Подтвердите пароль"></div>
            <button class="profile-btn edit-btn" id="registerBtn" style="width:100%">Зарегистрироваться</button>
        </div>
        <div class="switch-auth" style="margin-top:16px">
            <span id="switchText">Нет аккаунта?</span>
            <button id="switchBtn" style="background:none; border:none; color:#007aff">Зарегистрироваться</button>
        </div>
        <button class="cancel-btn" id="closeAuthBtn" style="margin-top:12px">Закрыть</button>
    </div>
</div>

<script type="module">
    const tracksData = [
        { id: 1, title: "Supreme X Vetements", artist: "FACE", file: "FACE_-_Supreme_X_Vetements_64742030.mp3" },
        { id: 2, title: "Лабиринт", artist: "FACE", file: "FACE_-_LABIRINT_66800217.mp3" },
        { id: 3, title: "PSP", artist: "FACE", file: "FACE_-_PSP_64742023.mp3" },
        { id: 4, title: "Forever Young", artist: "FACE", file: "FACE_-_Forever_Young_64629973.mp3" },
        { id: 5, title: "Tom Ford", artist: "Moreart", file: "Moreart_-_Tom_Ford_80014966.mp3" }
    ];

    let currentIndex = 0, isPlaying = false, audio = new Audio(), shuffleMode = false, repeatMode = 'none', searchQuery = '';
    let currentUser = null, favorites = new Set(), currentTab = 'search';

    // DOM
    const trackListEl = document.getElementById('trackList');
    const favoritesListEl = document.getElementById('favoritesList');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const homeTab = document.getElementById('homeTab');
    const searchTab = document.getElementById('searchTab');
    const favoritesTab = document.getElementById('favoritesTab');
    const profileTab = document.getElementById('profileTab');
    const navItems = document.querySelectorAll('.nav-item[data-tab], .tab-item[data-tab]');
    const mobileSearchBtn = document.getElementById('mobileSearchBtn');
    const profileName = document.getElementById('profileName');
    const profileEmail = document.getElementById('profileEmail');
    const editProfileBtn = document.getElementById('editProfileBtn');
    const logoutConfirmBtn = document.getElementById('logoutConfirmBtn');
    const editModal = document.getElementById('editModal');
    const logoutModal = document.getElementById('logoutModal');
    const authModal = document.getElementById('authModal');
    const pcAccountIcon = document.getElementById('pcAccountIcon');

    // Плеер
    const desktopPlayer = document.getElementById('desktopPlayer');
    const miniPlayer = document.getElementById('miniPlayer');
    const miniTitle = document.getElementById('miniTitle');
    const miniArtist = document.getElementById('miniArtist');
    const miniPlay = document.getElementById('miniPlay');
    const miniNext = document.getElementById('miniNext');
    const desktopTitle = document.getElementById('desktopTitle');
    const desktopArtist = document.getElementById('desktopArtist');
    const playerPlay = document.getElementById('playerPlay');
    const playerPrev = document.getElementById('playerPrev');
    const playerNext = document.getElementById('playerNext');
    const playerShuffle = document.getElementById('playerShuffle');
    const playerRepeat = document.getElementById('playerRepeat');
    const progressFill = document.getElementById('progressFill');
    const progressBarBg = document.getElementById('progressBarBg');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');

    function switchTab(tabId) {
        currentTab = tabId;
        homeTab.style.display = tabId === 'home' ? 'block' : 'none';
        searchTab.style.display = tabId === 'search' ? 'block' : 'none';
        favoritesTab.style.display = tabId === 'favorites' ? 'block' : 'none';
        profileTab.style.display = tabId === 'profile' ? 'block' : 'none';
        document.querySelectorAll('.nav-item, .tab-item').forEach(el => {
            if (el.dataset?.tab === tabId) el.classList.add('active');
            else el.classList.remove('active');
        });
        if (tabId === 'favorites') renderFavoritesList();
        if (tabId === 'profile' && !currentUser) showAuthModal();
    }

    function attachEvents(container) {
        container.querySelectorAll('.track-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.closest('.favorite-btn')) return;
                const idx = parseInt(el.dataset.index);
                if (!isNaN(idx)) {
                    currentIndex = idx;
                    loadTrack(currentIndex, true);
                }
            });
        });
        container.querySelectorAll('.favorite-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                if (!currentUser) { showAuthModal(); return; }
                if (favorites.has(id)) favorites.delete(id);
                else favorites.add(id);
                await saveFavorites();
                renderTrackList();
                if (currentTab === 'favorites') renderFavoritesList();
                btn.classList.toggle('active', favorites.has(id));
            });
        });
    }

    function renderTrackList() {
        const filtered = tracksData.filter(t => !searchQuery || t.title.toLowerCase().includes(searchQuery.toLowerCase()) || t.artist.toLowerCase().includes(searchQuery.toLowerCase()));
        if (!filtered.length) { trackListEl.innerHTML = '<div class="empty-state">Ничего не найдено</div>'; return; }
        trackListEl.innerHTML = filtered.map((t, i) => {
            const idx = tracksData.findIndex(tr => tr.id === t.id);
            const isFav = favorites.has(t.id);
            return `<div class="track-item" data-index="${idx}"><div class="track-number">${i+1}</div><div class="track-cover"><i class="fas fa-music"></i></div><div class="track-info"><div class="track-name">${escapeHtml(t.title)}</div><div class="track-artist">${escapeHtml(t.artist)}</div></div><button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${t.id}"><i class="fas fa-heart"></i></button></div>`;
        }).join('');
        attachEvents(trackListEl);
    }

    function renderFavoritesList() {
        const fav = tracksData.filter(t => favorites.has(t.id));
        if (!fav.length) { favoritesListEl.innerHTML = '<div class="empty-state">Нет избранных треков</div>'; return; }
        favoritesListEl.innerHTML = fav.map((t, i) => {
            const idx = tracksData.findIndex(tr => tr.id === t.id);
            return `<div class="track-item" data-index="${idx}"><div class="track-number">${i+1}</div><div class="track-cover"><i class="fas fa-music"></i></div><div class="track-info"><div class="track-name">${escapeHtml(t.title)}</div><div class="track-artist">${escapeHtml(t.artist)}</div></div><button class="favorite-btn active" data-id="${t.id}"><i class="fas fa-heart"></i></button></div>`;
        }).join('');
        attachEvents(favoritesListEl);
    }

    async function saveFavorites() { if (currentUser) await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { favorites: Array.from(favorites) }, { merge: true }); }
    async function loadFavorites() { if (currentUser) { const doc = await window.getDoc(window.doc(window.db, 'users', currentUser.uid)); favorites = new Set(doc.exists() && doc.data().favorites ? doc.data().favorites : []); renderTrackList(); if (currentTab === 'favorites') renderFavoritesList(); } }

    function updateUI() {
        if (currentUser) {
            profileName.textContent = currentUser.displayName || currentUser.email.split('@')[0];
            profileEmail.textContent = currentUser.email;
        } else {
            profileName.textContent = 'Гость';
            profileEmail.textContent = 'Не авторизован';
        }
    }

    function showPlayer() {
        if (window.innerWidth <= 768) {
            miniPlayer.classList.remove('hidden');
        } else {
            desktopPlayer.classList.remove('hidden');
        }
    }

    function hidePlayer() {
        if (window.innerWidth <= 768) {
            miniPlayer.classList.add('hidden');
        } else {
            desktopPlayer.classList.add('hidden');
        }
    }

    function updatePlayerInfo(track) {
        const title = track.title, artist = track.artist;
        if (window.innerWidth <= 768) {
            miniTitle.textContent = title;
            miniArtist.textContent = artist;
        } else {
            desktopTitle.textContent = title;
            desktopArtist.textContent = artist;
        }
    }

    function loadTrack(idx, autoPlay = false) {
        if (idx < 0) idx = 0;
        if (idx >= tracksData.length) idx = 0;
        currentIndex = idx;
        const track = tracksData[currentIndex];
        if (!track) return;

        const wasPlaying = isPlaying;
        const currentVolume = volumeSlider.value;
        if (audio) { audio.pause(); audio.currentTime = 0; }
        audio = new Audio(`audio/${track.file}`);
        audio.volume = currentVolume;
        audio.addEventListener('loadedmetadata', () => durationSpan.textContent = formatDuration(audio.duration));
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
                currentTimeSpan.textContent = formatDuration(audio.currentTime);
            }
        });
        audio.addEventListener('ended', () => { if (repeatMode === 'one') { audio.currentTime = 0; audio.play(); } else nextTrack(); });
        updatePlayerInfo(track);
        showPlayer();

        if (autoPlay || wasPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayBtn();
            }).catch(() => {
                isPlaying = false;
                updatePlayBtn();
            });
        } else {
            isPlaying = false;
            updatePlayBtn();
        }
    }

    function togglePlay() {
        if (!tracksData[currentIndex]) return;
        if (!audio.src) loadTrack(currentIndex, true);
        if (audio.paused) {
            audio.play().then(() => { isPlaying = true; updatePlayBtn(); });
        } else {
            audio.pause();
            isPlaying = false;
            updatePlayBtn();
        }
    }

    function updatePlayBtn() {
        const icon = window.innerWidth <= 768 ? miniPlay.querySelector('i') : playerPlay.querySelector('i');
        if (icon) icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    function nextTrack() {
        let next = (currentIndex + 1) % tracksData.length;
        currentIndex = next;
        loadTrack(currentIndex, isPlaying);
    }

    function prevTrack() {
        let prev = (currentIndex - 1 + tracksData.length) % tracksData.length;
        currentIndex = prev;
        loadTrack(currentIndex, isPlaying);
    }

    function toggleShuffle() { shuffleMode = !shuffleMode; playerShuffle.classList.toggle('active', shuffleMode); }
    function toggleRepeat() {
        if (repeatMode === 'none') { repeatMode = 'all'; playerRepeat.classList.add('active'); playerRepeat.innerHTML = '<i class="fas fa-repeat"></i>'; }
        else if (repeatMode === 'all') { repeatMode = 'one'; playerRepeat.innerHTML = '<i class="fas fa-repeat-1"></i>'; }
        else { repeatMode = 'none'; playerRepeat.classList.remove('active'); playerRepeat.innerHTML = '<i class="fas fa-repeat"></i>'; }
    }
    function seek(e) { if (!audio.duration) return; const rect = progressBarBg.getBoundingClientRect(); audio.currentTime = (e.clientX - rect.left) / rect.width * audio.duration; }
    function formatDuration(sec) { if (isNaN(sec)) return '0:00'; const m = Math.floor(sec/60), s = Math.floor(sec%60); return `${m}:${s<10?'0':''}${s}`; }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    // Auth
    function showAuthModal() { authModal.classList.add('active'); }
    function hideAuthModal() { authModal.classList.remove('active'); }
    function showEditModal() { if (currentUser) { document.getElementById('editName').value = currentUser.displayName || ''; editModal.classList.add('active'); } }
    function hideEditModal() { editModal.classList.remove('active'); }
    function showLogoutConfirm() { if (currentUser) logoutModal.classList.add('active'); }
    function hideLogoutModal() { logoutModal.classList.remove('active'); }

    async function handleLogin() { const email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPassword').value; if (!email || !pass) return; try { const res = await window.signInWithEmailAndPassword(window.auth, email, pass); currentUser = res.user; updateUI(); hideAuthModal(); await loadFavorites(); } catch(e) { document.getElementById('authError').style.display='block'; document.getElementById('authError').textContent='Неверный email или пароль'; } }
    async function handleRegister() { const name = document.getElementById('registerName').value, email = document.getElementById('registerEmail').value, pass = document.getElementById('registerPassword').value, conf = document.getElementById('registerConfirm').value; if (!name || !email || !pass) return; if (pass !== conf) return; try { const res = await window.createUserWithEmailAndPassword(window.auth, email, pass); await window.updateProfile(res.user, { displayName: name }); await window.setDoc(window.doc(window.db, 'users', res.user.uid), { displayName: name, email, favorites: [] }); currentUser = res.user; updateUI(); hideAuthModal(); await loadFavorites(); } catch(e) { document.getElementById('authError').style.display='block'; document.getElementById('authError').textContent='Ошибка регистрации'; } }
    async function handleSaveName() { const newName = document.getElementById('editName').value.trim(); if (newName && currentUser) { await window.updateProfile(currentUser, { displayName: newName }); await window.setDoc(window.doc(window.db, 'users', currentUser.uid), { displayName: newName }, { merge: true }); updateUI(); } hideEditModal(); }
    async function handleLogout() { await window.signOut(window.auth); currentUser = null; favorites.clear(); updateUI(); hideLogoutModal(); renderTrackList(); if (currentTab === 'favorites') renderFavoritesList(); hidePlayer(); }

    let isLoginMode = true;
    document.getElementById('switchBtn').onclick = () => { isLoginMode = !isLoginMode; document.getElementById('loginForm').style.display = isLoginMode ? 'block' : 'none'; document.getElementById('registerForm').style.display = isLoginMode ? 'none' : 'block'; document.getElementById('modalTitle').textContent = isLoginMode ? 'Вход' : 'Регистрация'; document.getElementById('switchText').textContent = isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?'; document.getElementById('switchBtn').textContent = isLoginMode ? 'Зарегистрироваться' : 'Войти'; };

    function init() {
        renderTrackList();
        document.querySelectorAll('.nav-item[data-tab], .tab-item[data-tab]').forEach(i => i.addEventListener('click', () => switchTab(i.dataset.tab)));
        mobileSearchBtn?.addEventListener('click', () => switchTab('search'));
        playerPlay?.addEventListener('click', togglePlay); playerPrev?.addEventListener('click', prevTrack); playerNext?.addEventListener('click', nextTrack); playerShuffle?.addEventListener('click', toggleShuffle); playerRepeat?.addEventListener('click', toggleRepeat);
        miniPlay?.addEventListener('click', togglePlay); miniNext?.addEventListener('click', nextTrack);
        progressBarBg?.addEventListener('click', seek); volumeSlider?.addEventListener('input', e => { if(audio) audio.volume = e.target.value; });
        searchInput?.addEventListener('input', e => { searchQuery = e.target.value; searchClear.style.display = searchQuery ? 'block' : 'none'; renderTrackList(); });
        searchClear?.addEventListener('click', () => { searchInput.value = ''; searchQuery = ''; searchClear.style.display = 'none'; renderTrackList(); });
        pcAccountIcon?.addEventListener('click', () => { if(currentUser) switchTab('profile'); else showAuthModal(); });
        editProfileBtn?.addEventListener('click', showEditModal);
        logoutConfirmBtn?.addEventListener('click', showLogoutConfirm);
        document.getElementById('saveEditBtn')?.addEventListener('click', handleSaveName);
        document.getElementById('closeEditBtn')?.addEventListener('click', hideEditModal);
        document.getElementById('confirmLogoutBtn')?.addEventListener('click', handleLogout);
        document.getElementById('cancelLogoutBtn')?.addEventListener('click', hideLogoutModal);
        document.getElementById('loginBtn')?.addEventListener('click', handleLogin);
        document.getElementById('registerBtn')?.addEventListener('click', handleRegister);
        document.getElementById('closeAuthBtn')?.addEventListener('click', hideAuthModal);
        window.onAuthStateChanged(window.auth, async (user) => { currentUser = user; updateUI(); await loadFavorites(); });
        window.addEventListener('click', e => { if(e.target === editModal) hideEditModal(); if(e.target === logoutModal) hideLogoutModal(); if(e.target === authModal) hideAuthModal(); });
        switchTab('search');
        hidePlayer();
    }
    init();
</script>
</body>
</html>
